<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f9f9f9;
            color: #1a1a1a;
            min-height: 100vh;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 40px;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        h1 {
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: -0.5px;
        }

        .nav-link {
            text-decoration: none;
            color: #1a1a1a;
            font-size: 0.9rem;
            border: 1px solid #1a1a1a;
            padding: 6px 12px;
            transition: all 0.2s ease;
        }

        .nav-link:hover {
            background-color: #1a1a1a;
            color: #fff;
        }

        .dashboard-card {
            background: #ffffff;
            padding: 40px;
            border: 1px solid #eaeaea;
            margin-bottom: 40px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th, .data-table td {
            padding: 15px 0;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }

        .data-table th {
            font-weight: 500;
            color: #666;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .weight-value {
            font-weight: 400;
            color: #1a1a1a;
            font-family: monospace;
            font-size: 1.1rem;
        }

        .btn-container {
            display: flex;
            justify-content: flex-end;
        }

        .btn {
            padding: 10px 20px;
            background: #1a1a1a;
            color: #fff;
            border: none;
            font-size: 0.9rem;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s ease;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            background: #333;
        }

        .empty-state {
            text-align: center;
            padding: 40px 0;
            color: #888;
            font-style: italic;
            display: none;
        }

    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Data Log</h1>
            <a href="index.html" class="nav-link">Back to Program</a>
        </header>

        <div class="dashboard-card">
            <table class="data-table" id="dataTable">
                <thead>
                    <tr>
                        <th>Exercise</th>
                        <th>Logged Weight</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
            
            <div class="empty-state" id="emptyState">
                No logs recorded yet.
            </div>
        </div>

        <div class="btn-container">
            <button onclick="exportToCSV()" class="btn" id="exportBtn">Export CSV</button>
        </div>
    </div>

    <script>
        const exerciseNames = {
            'squatA': 'Squat (Workout A)',
            'benchPress': 'Bench Press',
            'barbellRow': 'Barbell Row',
            'stepUp': 'Poliquin Step-Up',
            'latRaise': 'Lateral Raise',
            'squatB': 'Squat (Workout B)',
            'ohp': 'Overhead Press',
            'deadlift': 'Deadlift',
            'legCurl': 'Lying Leg Curl',
            'facePull': 'Cable Face Pull'
        };

        document.addEventListener('DOMContentLoaded', () => {
            const tableBody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');
            const dataTable = document.getElementById('dataTable');
            const exportBtn = document.getElementById('exportBtn');
            let hasData = false;

            for (const [id, name] of Object.entries(exerciseNames)) {
                const savedWeight = localStorage.getItem(id);
                
                if (savedWeight) {
                    hasData = true;
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${name}</td>
                        <td><span class="weight-value">${savedWeight}</span></td>
                    `;
                    tableBody.appendChild(row);
                }
            }

            if (!hasData) {
                dataTable.style.display = 'none';
                exportBtn.style.display = 'none';
                emptyState.style.display = 'block';
            }
        });

        function exportToCSV() {
            let csvContent = "data:text/csv;charset=utf-8,Exercise,Weight Logged\n";
            for (const [id, name] of Object.entries(exerciseNames)) {
                const savedWeight = localStorage.getItem(id) || "";
                if (savedWeight) {
                    csvContent += `"${name}","${savedWeight}"\n`; 
                }
            }
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "5x5_Minimal_Log.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
